</div> <!-- jQuery (for DataTables integration) --> <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- DataTables core + Bootstrap adapter --> <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script> <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script> <!-- Papa Parse (CSV parser) --> <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script> <script> /************* SET THESE *************/ const OWNER = "gayleF-cgs"; const REPO = "AHT-interval"; const BRANCH = "main"; /************************************/ const THRESHOLD = 490; // Overall table: highlight if 3rd column > 490 const OVERALL_CSV = "cbhccoverallAHT.csv"; const OVERALL_COL_INDEX = 2; // 3rd column // Grand Total detection (Overall table only) const GRAND_TOTAL_TEXT = "Grand Total"; const GRAND_TOTAL_COL_INDEX = 1; // column 2 (1-based) => index 1 (0-based) // Interval table: highlight if 5th column > 490 const INTERVAL_CSV = "cbhcc.csv"; const INTERVAL_COL_INDEX = 4; // 5th column function toNumber(x) { const n = Number(String(x ?? "").replace(/[^0-9.-]/g, "")); return Number.isFinite(n) ? n : null; } function setToday() { const today = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", year: "numeric", month: "long", day: "2-digit" }).format(new Date()); document.getElementById("today").textContent = today; } async function setAsOfFromLastCommit(filename) { const el = document.getElementById("intervalAsOf"); try { const api = `https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${encodeURIComponent(filename)}&per_page=1&sha=${encodeURIComponent(BRANCH)}`; const res = await fetch(api, { headers: { "Accept": "application/vnd.github+json" } }); if (!res.ok) { const body = await res.text(); throw new Error(`GitHub API HTTP ${res.status}: ${body.slice(0, 160)}`); } const commits = await res.json(); const iso = commits?.[0]?.commit?.committer?.date || commits?.[0]?.commit?.author?.date; if (!iso) throw new Error("No commit date found for this file."); const formatted = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", year: "numeric", month: "short", day: "2-digit", hour: "numeric", minute: "2-digit" }).format(new Date(iso)); el.textContent = formatted; } catch (e) { console.error(e); el.textContent = "unable to fetch time"; } } function renderCSVTable({ csvFile, tableSelector, statusId, highlightColIndex }) { const statusEl = document.getElementById(statusId); Papa.parse(csvFile + "?v=" + Date.now(), { download: true, header: true, skipEmptyLines: true, complete: function(results) { const data = results.data; const fields = results.meta.fields || []; const columns = fields.map(name => ({ title: name, data: name })); statusEl.className = "alert alert-success py-2 px-3 mt-3 mb-3"; statusEl.textContent = `Loaded ${data.length} row(s) from ${csvFile}.`; new DataTable(tableSelector, { data, columns, pageLength: 25, scrollX: true, createdRow: function(row, rowData) { const colName = fields[highlightColIndex]; const value = toNumber(rowData[colName]); if (value !== null && value > THRESHOLD) $(row).addClass("high-red-row"); } }); }, error: function(err) { console.error(err); statusEl.className = "alert alert-danger py-2 px-3 mt-3 mb-3"; statusEl.textContent = `Failed to load ${csvFile}: ${err.message || err}`; } }); } // Special renderer: keep Grand Total as fixed footer (Overall table) function renderOverallWithFixedGrandTotal() { const statusEl = document.getElementById("statusOverall"); const tableEl = document.querySelector("#tblOverall"); const tfootEl = tableEl.querySelector("tfoot"); Papa.parse(OVERALL_CSV + "?v=" + Date.now(), { download: true, header: true, skipEmptyLines: true, complete: function(results) { const allRows = results.data; const fields = results.meta.fields || []; const columns = fields.map(name => ({ title: name, data: name })); const gtFieldName = fields[GRAND_TOTAL_COL_INDEX]; const isGrandTotal = (r) => String(r?.[gtFieldName] ?? "").trim().toLowerCase() === GRAND_TOTAL_TEXT.toLowerCase(); const grandTotalRow = allRows.find(isGrandTotal); const data = allRows.filter(r => !isGrandTotal(r)); // Build the footer row HTML (always visible) if (grandTotalRow) { const tds = fields.map(f => `<td>${(grandTotalRow[f] ?? "").toString()}</td>`).join(""); tfootEl.innerHTML = `<tr class="grand-total-row">${tds}</tr>`; } else { tfootEl.innerHTML = ""; } statusEl.className = "alert alert-success py-2 px-3 mt-3 mb-3"; statusEl.textContent = `Loaded ${data.length} row(s) from ${OVERALL_CSV}.` + (grandTotalRow ? " (Grand Total fixed.)" : " (No Grand Total row found.)"); new DataTable("#tblOverall", { data, columns, pageLength: 25, scrollX: true, createdRow: function(row, rowData) { const colName = fields[OVERALL_COL_INDEX]; const value = toNumber(rowData[colName]); if (value !== null && value > THRESHOLD) $(row).addClass("high-red-row"); } }); }, error: function(err) { console.error(err); statusEl.className = "alert alert-danger py-2 px-3 mt-3 mb-3"; statusEl.textContent = `Failed to load ${OVERALL_CSV}: ${err.message || err}`; } }); } // Run setToday(); setAsOfFromLastCommit(INTERVAL_CSV); renderOverallWithFixedGrandTotal(); renderCSVTable({ csvFile: INTERVAL_CSV, tableSelector: "#tblInterval", statusId: "statusInterval", highlightColIndex: INTERVAL_COL_INDEX }); </script> </body> </html>
